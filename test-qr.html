<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Scanner Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: system-ui;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 16px;
            background: #1a1a2e;
            color: #eee;
        }

        .result {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .success {
            background: #1b4332;
            border: 1px solid #2d6a4f;
        }

        .error {
            background: #3d0000;
            border: 1px solid #8b0000;
        }

        .info {
            background: #1a1a3e;
            border: 1px solid #4a4a8e;
        }

        input[type=file] {
            margin: 16px 0;
        }

        h2 {
            color: #6c63ff;
        }
    </style>
</head>

<body>
    <h2>🔍 QR Scanner Debug</h2>
    <input type="file" id="qr-file" accept="image/*">
    <div id="log"></div>
    <div id="__qr_scan_tmp__" style="display:none"></div>

    <script>
        const log = document.getElementById('log');
        function addLog(engine, status, msg) {
            const cls = status === 'OK' ? 'success' : status === 'FAIL' ? 'error' : 'info';
            const icon = status === 'OK' ? '✅' : status === 'FAIL' ? '❌' : 'ℹ️';
            log.innerHTML += `<div class="result ${cls}">${icon} <b>[${engine}]</b> ${msg}</div>`;
        }

        document.getElementById('qr-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            log.innerHTML = `<div class="result info">📁 File: ${file.name} (${(file.size / 1024).toFixed(1)}KB, ${file.type})</div>`;

            // Engine 1: BarcodeDetector
            addLog('BarcodeDetector', 'INFO', `Available: ${typeof BarcodeDetector !== 'undefined'}`);
            if (typeof BarcodeDetector !== 'undefined') {
                try {
                    const bitmap = await createImageBitmap(file);
                    addLog('BarcodeDetector', 'INFO', `Bitmap: ${bitmap.width}x${bitmap.height}`);
                    const detector = new BarcodeDetector({ formats: ['qr_code'] });
                    const results = await detector.detect(bitmap);
                    bitmap.close();
                    if (results.length > 0) {
                        addLog('BarcodeDetector', 'OK', `Decoded: ${results[0].rawValue.substring(0, 100)}...`);
                    } else {
                        addLog('BarcodeDetector', 'FAIL', 'No QR found (0 results)');
                    }
                } catch (err) {
                    addLog('BarcodeDetector', 'FAIL', `Error: ${err.message}`);
                }
            }

            // Engine 2: Html5Qrcode
            addLog('Html5Qrcode', 'INFO', `Available: ${typeof Html5Qrcode !== 'undefined'}`);
            if (typeof Html5Qrcode !== 'undefined') {
                try {
                    const html5Qr = new Html5Qrcode('__qr_scan_tmp__', false);
                    const decoded = await html5Qr.scanFile(file, false);
                    html5Qr.clear();
                    addLog('Html5Qrcode', 'OK', `Decoded: ${decoded.substring(0, 100)}...`);
                } catch (err) {
                    addLog('Html5Qrcode', 'FAIL', `Error: ${err}`);
                }
            }

            // Engine 3: QrScanner
            addLog('QrScanner', 'INFO', `Available: ${typeof QrScanner !== 'undefined'}`);
            if (typeof QrScanner !== 'undefined') {
                try {
                    const result = await QrScanner.scanImage(file, {
                        returnDetailedScanResult: true,
                        alsoTryWithoutScanRegion: true,
                    });
                    addLog('QrScanner', 'OK', `Decoded: ${result.data.substring(0, 100)}...`);
                } catch (err) {
                    addLog('QrScanner', 'FAIL', `Error: ${err}`);
                }
            }
        });
    </script>
</body>

</html>
